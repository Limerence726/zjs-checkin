name: 紫金山自动打卡

on:
  schedule:
    # 每天 7:30 Asia/Shanghai = 23:30 UTC (前一天)
    - cron: '30 23 * * *'
  workflow_dispatch:  # 允许手动触发
    inputs:
      force:
        description: '强制运行（忽略时间窗口）'
        required: false
        default: 'false'

jobs:
  checkin:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出仓库
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
    
    - name: 设置 PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.1'
        extensions: curl, json
    
    - name: 执行打卡
      env:
        PAT_TOKEN: ${{ secrets.PAT }}
      run: |
        # 执行打卡脚本（从 GitHub API 读取 accounts_status.json）
        php checkin.php
    
    - name: 提交结果（通过 GitHub API）
      env:
        PAT_TOKEN: ${{ secrets.PAT }}
        GITHUB_TOKEN: ${{ secrets.PAT }}
      run: |
        DATE=$(date +%Y-%m-%d)
        RESULT_FILE="results/${DATE}.json"
        
        mkdir -p results
        
        if [ -f "checkin_result.json" ]; then
          mv checkin_result.json "$RESULT_FILE"
          CONTENT=$(base64 -w0 "$RESULT_FILE")
          
          # 检查文件是否已存在
          SHA=$(curl -sf -H "Authorization: token ${PAT_TOKEN}" \
            "https://api.github.com/repos/Limerence726/zjs-checkin/contents/${RESULT_FILE}?ref=main" | python3 -c "import sys,json; print(json.load(sys.stdin).get('sha',''))" 2>/dev/null || echo "")
          
          if [ -n "$SHA" ]; then
            # 更新已有文件
            curl -s -X PUT -H "Authorization: token ${PAT_TOKEN}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/Limerence726/zjs-checkin/contents/${RESULT_FILE}" \
              -d "{\"message\":\"打卡结果 ${DATE}\",\"content\":\"${CONTENT}\",\"sha\":\"${SHA}\",\"branch\":\"main\"}"
            echo "✅ 已更新 ${RESULT_FILE}"
          else
            # 创建新文件
            curl -s -X PUT -H "Authorization: token ${PAT_TOKEN}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/Limerence726/zjs-checkin/contents/${RESULT_FILE}" \
              -d "{\"message\":\"打卡结果 ${DATE}\",\"content\":\"${CONTENT}\",\"branch\":\"main\"}"
            echo "✅ 已创建 ${RESULT_FILE}"
          fi
        else
          echo "⚠️ 无打卡结果文件"
        fi

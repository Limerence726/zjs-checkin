<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>紫金山打卡</title>
<style>
:root{
  --bg:#F8F8F8;
  --card:#fff;
  --text:#1d1d1f;
  --text2:#86868b;
  --text3:#aeaeb2;
  --accent:#6ED2B4;
  --accent-light:#f0faf6;
  --border:#e5e5ea;
  --radius:12px;
  --red:#ff3b30;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,"SF Pro Text","SF Pro Display","Helvetica Neue",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}

.wrap{max-width:420px;margin:0 auto;padding:0 20px 40px}

/* ── 登录页 ── */
.login-page{padding-top:80px;text-align:center}
.login-title{font-size:28px;font-weight:700;letter-spacing:-0.5px;margin-bottom:6px}
.login-sub{font-size:15px;color:var(--text2);margin-bottom:44px}
.form{padding:0 4px}
.field{margin-bottom:24px;text-align:left}
.field label{display:block;font-size:13px;font-weight:500;margin-bottom:8px;padding-left:1px}
.field input{width:100%;height:48px;padding:0 14px;font-size:16px;border:none;border-radius:var(--radius);background:var(--bg);outline:none;transition:box-shadow 0.2s}
.field input:focus{box-shadow:0 0 0 3px var(--accent-light)}
.field input::placeholder{color:var(--text3)}
.btn-login{display:block;width:100%;height:50px;font-size:17px;font-weight:600;color:#fff;background:var(--accent);border:none;border-radius:var(--radius);cursor:pointer;margin-top:8px;transition:opacity 0.2s,transform 0.08s}
.btn-login:active{opacity:0.85;transform:scale(0.98)}
.btn-login:disabled{opacity:0.35;cursor:not-allowed;transform:none}
.err-msg{text-align:center;font-size:14px;color:var(--red);margin-top:16px;display:none;font-weight:500}
.disclaimer{margin-top:48px;padding:20px 16px 0;border-top:1px solid var(--border)}
.disclaimer p{font-size:12px;color:var(--text3);line-height:1.7;text-align:center}

/* ── 主面板 ── */
.main-page{padding-top:24px}
.nav-bar{display:flex;justify-content:space-between;align-items:center;padding:4px 0 24px}
.nav-bar h1{font-size:22px;font-weight:700;letter-spacing:-0.3px}
.nav-btn{font-size:15px;color:var(--accent);cursor:pointer;background:none;border:none;padding:4px 10px;font-weight:500}

.card{background:var(--card);border-radius:var(--radius);padding:20px;margin-bottom:14px}

/* 开关 */
.toggle-row{display:flex;justify-content:space-between;align-items:center}
.toggle-name{font-size:16px;font-weight:600}
.toggle-desc{font-size:13px;color:var(--text2);margin-top:3px}
.switch{width:51px;height:31px;background:var(--text3);border-radius:16px;cursor:pointer;position:relative;flex-shrink:0;transition:background 0.3s cubic-bezier(0.25,0.1,0.25,1)}
.switch.on{background:var(--accent)}
.switch .knob{position:absolute;top:2px;left:2px;width:27px;height:27px;background:#fff;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,0.12),0 0.5px 1px rgba(0,0,0,0.06);transition:transform 0.3s cubic-bezier(0.25,0.1,0.25,1)}
.switch.on .knob{transform:translateX(20px)}
.toggle-hint{text-align:right;font-size:13px;color:var(--text2);margin-top:10px;font-weight:500}

/* 状态 */
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.section-header h3{font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px}
.refresh-btn{font-size:13px;color:var(--accent);cursor:pointer;background:none;border:none;font-weight:500}

.status-center{text-align:center;padding:24px 0 8px}
.status-icon-wrap{width:64px;height:64px;margin:0 auto 14px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.status-icon-wrap.done{background:var(--accent-light)}
.status-icon-wrap.wait{background:var(--bg)}
.status-icon-wrap .si{font-size:28px;line-height:1}
.status-label{font-size:22px;font-weight:700}
.status-time{font-size:13px;color:var(--text2);margin-top:4px}

.detail-row{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-top:24px;padding-top:20px;border-top:1px solid var(--border)}
.di{text-align:center;padding:8px 0}
.di-v{font-size:20px;font-weight:700}
.di-l{font-size:11px;color:var(--text2);margin-top:3px}

/* 月度 */
.month-bar{display:flex;gap:10px;margin-bottom:20px}
.ms{flex:1;text-align:center;padding:14px 8px;background:var(--bg);border-radius:10px}
.ms-n{font-size:24px;font-weight:700}
.ms-l{font-size:11px;color:var(--text2);margin-top:4px}

/* 日历 */
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:0;text-align:center}
.ch{font-size:12px;color:var(--text3);padding:10px 2px;font-weight:500}
.ce{padding:9px 2px;font-size:15px}
.ce-off{color:var(--text3)}
.ce-ok{color:#fff;background:var(--accent);border-radius:50%;width:34px;height:34px;display:inline-flex;align-items:center;justify-content:center;margin:0 auto;font-size:14px;font-weight:600}
.ce-now{color:var(--accent);border:1.5px solid var(--accent);border-radius:50%;width:34px;height:34px;display:inline-flex;align-items:center;justify-content:center;margin:0 auto;font-size:14px;font-weight:600}

/* ── 链接刷新 ── */
.refresh-links-area{margin-bottom:14px}
.refresh-links-area label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:4px}
.refresh-links-area textarea{width:100%;height:90px;padding:10px;font-size:13px;border:1px solid var(--border);border-radius:8px;background:var(--bg);outline:none;resize:vertical;line-height:1.5}
.refresh-links-area textarea:focus{border-color:var(--accent)}
.refresh-links-area textarea::placeholder{color:var(--text3)}

.refresh-settings{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.refresh-settings .rfield{flex:1;min-width:90px}
.refresh-settings .rfield label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:4px}
.refresh-settings .rfield input{width:100%;height:40px;padding:0 10px;font-size:14px;border:1px solid var(--border);border-radius:8px;background:var(--bg);outline:none}
.refresh-settings .rfield input:focus{border-color:var(--accent)}

.refresh-actions{display:flex;gap:8px;margin-bottom:14px}
.btn-r{height:40px;padding:0 18px;font-size:14px;font-weight:600;border:none;border-radius:8px;cursor:pointer;transition:opacity 0.15s,transform 0.06s}
.btn-r:active{opacity:0.85;transform:scale(0.98)}
.btn-r:disabled{opacity:0.35;cursor:not-allowed;transform:none}
.btn-r.primary{background:var(--accent);color:#fff}
.btn-r.secondary{background:var(--bg);color:var(--text);border:1px solid var(--border)}

.progress-wrap{display:none;margin-top:14px}
.progress-bar{width:100%;height:22px;background:var(--bg);border-radius:11px;position:relative;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:11px;width:0%;transition:width 0.3s}
.progress-text{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600}
.refresh-stats{display:flex;gap:8px;margin-top:12px}
.refresh-stats .rs{flex:1;text-align:center;padding:10px 6px;background:var(--bg);border-radius:8px}
.refresh-stats .rs-v{font-size:18px;font-weight:700}
.refresh-stats .rs-l{font-size:10px;color:var(--text2);margin-top:2px}

.link-detail-table{width:100%;border-collapse:collapse;margin-top:14px;font-size:12px}
.link-detail-table th{background:var(--bg);padding:8px 6px;text-align:left;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border)}
.link-detail-table td{padding:8px 6px;border-bottom:1px solid var(--border);color:var(--text2)}
.link-detail-table td:first-child{color:var(--text);font-weight:500;max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── 文章列表 ── */
.article-search{width:100%;height:40px;padding:0 12px;font-size:14px;border:1px solid var(--border);border-radius:8px;background:var(--bg);outline:none;margin-bottom:10px}
.article-search:focus{border-color:var(--accent)}
.article-toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px;font-size:13px}
.article-toolbar label{display:flex;align-items:center;gap:4px;font-weight:500;cursor:pointer;color:var(--text2)}
.article-toolbar button{padding:4px 10px;font-size:12px;background:var(--card);color:var(--text2);border:1px solid var(--border);border-radius:6px;cursor:pointer}
.article-toolbar button:active{opacity:0.7}

.article-list{max-height:600px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.article-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.article-item:last-child{border-bottom:none}
.article-item input[type=checkbox]{flex-shrink:0;width:18px;height:18px;accent-color:var(--accent)}
.article-info{flex:1;min-width:0}
.article-title{font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4}
.article-meta{font-size:12px;color:var(--text3);margin-top:2px}
.browse-up{color:var(--accent);font-weight:600;transition:color 0.3s}

.load-more-btn{display:block;width:100%;height:44px;margin-top:10px;font-size:14px;font-weight:500;color:var(--accent);background:var(--bg);border:1px solid var(--border);border-radius:8px;cursor:pointer}
.load-more-btn:active{opacity:0.7}
.load-more-btn:disabled{opacity:0.35;cursor:not-allowed}

.sel-info{font-size:12px;color:var(--text3)}
.empty-msg{text-align:center;padding:30px 0;color:var(--text3);font-size:14px}
</style>
</head>
<body>

<!-- 登录页 -->
<div id="logincard" class="wrap login-page">
  <h1 class="login-title">紫金山打卡</h1>
  <p class="login-sub">输入手机号和密码登录</p>
  <div class="form">
    <div class="field">
      <label>手机号</label>
      <input type="tel" id="phone" maxlength="11" placeholder="11位手机号" autocomplete="tel">
    </div>
    <div class="field">
      <label>密码</label>
      <input type="password" id="pwd" placeholder="紫金山App密码" autocomplete="current-password">
    </div>
    <button class="btn-login" id="loginbtn" onclick="doLogin()">登 录</button>
    <div class="err-msg" id="errmsg"></div>
  </div>
  <div class="disclaimer">
    <p>本页面不收集用户信息，如有疑虑可不使用。<br>非长期稳定手段，有失效可能，养成良好打卡习惯更佳。仅供娱乐。</p>
  </div>
</div>

<!-- 主面板 -->
<div id="maincard" class="wrap main-page" style="display:none">
  <div class="nav-bar">
    <h1>紫金山打卡</h1>
    <button class="nav-btn" onclick="doLogout()">退出</button>
  </div>

  <!-- 自动打卡开关 -->
  <div class="card">
    <div class="toggle-row">
      <div>
        <div class="toggle-name">自动打卡</div>
        <div class="toggle-desc">每日 07:30 自动执行签到、阅读、分享、点赞</div>
      </div>
      <div class="switch" id="sw" onclick="doToggle()"><div class="knob" id="swd"></div></div>
    </div>
    <div class="toggle-hint" id="stxt">已关闭</div>
  </div>

  <!-- 今日状态 -->
  <div class="card">
    <div class="section-header">
      <h3>今日状态</h3>
      <button class="refresh-btn" onclick="loadStatus()">刷新</button>
    </div>
    <div id="statusbox"><div style="text-align:center;padding:28px 0;color:var(--text3)">加载中...</div></div>
  </div>

  <!-- 本月打卡 -->
  <div class="card">
    <div class="section-header">
      <h3>本月打卡 · <span id="mlabel" style="color:var(--text);font-weight:600"></span></h3>
    </div>
    <div id="calbox"><div style="text-align:center;padding:28px 0;color:var(--text3)">加载中...</div></div>
  </div>

  <!-- 链接刷新工具 -->
  <div class="card">
    <div class="section-header">
      <h3>链接刷新</h3>
    </div>
    <div class="refresh-links-area">
      <label>链接列表（每行一个，勾选下方文章会自动加入）</label>
      <textarea id="refreshLinks" placeholder="https://example.com/page1&#10;https://example.com/page2"></textarea>
    </div>
    <div class="refresh-settings">
      <div class="rfield"><label>每链接次数</label><input type="number" id="requestsPerLink" value="1000" min="1"></div>
      <div class="rfield"><label>完成时间(秒)</label><input type="number" id="duration" value="30" min="1"></div>
      <div class="rfield"><label>并发线程</label><input type="number" id="maxWorkers" value="5" min="1"></div>
    </div>
    <div class="refresh-actions">
      <button class="btn-r primary" id="startBtn" onclick="startRefresh()">开始刷新</button>
      <button class="btn-r secondary" id="stopBtn" onclick="stopRefresh()" disabled>停止</button>
    </div>
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
        <div class="progress-text" id="progressPct">0%</div>
      </div>
      <div class="refresh-stats">
        <div class="rs"><div class="rs-v" id="statSuccess">0</div><div class="rs-l">成功</div></div>
        <div class="rs"><div class="rs-v" id="statFail">0</div><div class="rs-l">失败</div></div>
        <div class="rs"><div class="rs-v" id="statElapsed">0s</div><div class="rs-l">用时</div></div>
        <div class="rs"><div class="rs-v" id="statTotal">0%</div><div class="rs-l">总进度</div></div>
      </div>
      <table class="link-detail-table">
        <thead><tr><th>链接</th><th>状态</th><th>进度</th><th>成功</th><th>失败</th></tr></thead>
        <tbody id="linksTableBody"></tbody>
      </table>
    </div>
  </div>

  <!-- 今日文章 -->
  <div class="card">
    <div class="section-header">
      <h3>今日文章 <span id="articleCount" style="color:var(--text3);font-weight:400;font-size:12px">加载中</span></h3>
    </div>
    <div class="article-toolbar" style="margin-bottom:8px">
      <input type="search" class="article-search" id="articleSearchInput" placeholder="搜索文章标题..." oninput="onArticleSearch()" style="flex:1;margin:0">
      <button onclick="loadArticles(true)" style="margin-left:8px;padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg);font-size:13px;cursor:pointer">刷新列表</button>
    </div>
    <div class="article-toolbar">
      <label><input type="checkbox" id="selectAllChk" onchange="toggleSelectAll()"> 全选</label>
      <button onclick="invertSelection()">反选</button>
      <span style="flex:1"></span>
      <span class="sel-info" id="selInfo">已选 0 篇</span>
    </div>
    <div class="article-list" id="articleList">
      <div class="empty-msg">正在获取文章...</div>
    </div>
    <button class="load-more-btn" id="loadMoreBtn" onclick="loadMoreArticles()" style="display:none">加载更多</button>
  </div>
</div>

<script>
var S={phone:'',pwd:'',enabled:false,token:'',userId:''};
var API='https://autoclock-in.rth1.xyz/api_github.php';

function showErr(m){var e=document.getElementById('errmsg');e.textContent=m;e.style.display='block'}
function hideErr(){document.getElementById('errmsg').style.display='none'}
function localDate(d){var n=d||new Date();var off=n.getTimezoneOffset();var local=new Date(n.getTime()-off*60000);return local.toISOString().slice(0,10)}
function localMonth(d){var n=d||new Date();var off=n.getTimezoneOffset();var local=new Date(n.getTime()-off*60000);return local.toISOString().slice(0,7)}
function escHtml(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fmtNum(n){return n>=10000?(n/10000).toFixed(1)+'w':n>=1000?(n/1000).toFixed(1)+'k':String(n)}

// ── 登录 ──
async function doLogin(){
  var phone=document.getElementById('phone').value.trim();
  var pwd=document.getElementById('pwd').value;
  if(!phone||phone.length!==11){showErr('请输入11位手机号');return}
  if(!pwd){showErr('请输入密码');return}
  hideErr();
  var btn=document.getElementById('loginbtn');
  btn.disabled=true;btn.textContent='验证中...';
  try{
    var fd=new FormData();
    fd.append('phone',phone);fd.append('pwd',pwd);
    var res=await fetch(API+'?action=login',{method:'POST',body:fd});
    var d=await res.json();
    if(d.error){showErr(d.error)}
    else{
      S.phone=phone;S.pwd=pwd;S.enabled=d.enabled||false;
      S.token=d.token||'';S.userId=d.userId||'';
      document.getElementById('logincard').style.display='none';
      document.getElementById('maincard').style.display='block';
      updateSW();updateML();loadStatus();loadCal();
      if(S.token){AS.token=S.token;AS.userId=S.userId}
      loadArticles(true);
    }
  }catch(e){showErr('网络错误: '+e.message)}
  finally{btn.disabled=false;btn.textContent='登 录'}
}

function doLogout(){
  S.phone='';S.pwd='';S.enabled=false;S.token='';S.userId='';
  AS.token='';AS.userId='';AS.currentPage=1;AS.allArticles=[];
  document.getElementById('logincard').style.display='block';
  document.getElementById('maincard').style.display='none';
  document.getElementById('phone').value='';document.getElementById('pwd').value='';
}

// ── 开关 ──
function updateSW(){
  var sw=document.getElementById('sw'),t=document.getElementById('stxt');
  if(S.enabled){sw.className='switch on';t.textContent='已开启';t.style.color='var(--accent)'}
  else{sw.className='switch';t.textContent='已关闭';t.style.color='var(--text2)'}
}

var _toggleLock=false;
async function doToggle(){
  if(_toggleLock)return;_toggleLock=true;
  var ne=!S.enabled;
  // 立即视觉反馈
  S.enabled=ne;updateSW();
  try{
    var fd=new FormData();
    fd.append('phone',S.phone);fd.append('pwd',S.pwd);fd.append('enabled',ne?'1':'0');
    var res=await fetch(API+'?action=toggle',{method:'POST',body:fd});
    var d=await res.json();
    if(d.error){S.enabled=!ne;updateSW();showErr('保存失败: '+d.error)}
    else{S.enabled=d.enabled;updateSW();hideErr()}
  }catch(e){S.enabled=!ne;updateSW();showErr('网络错误，请重试')}
  setTimeout(function(){_toggleLock=false},1000);
}

// ── 今日状态 ──
async function loadStatus(){
  var box=document.getElementById('statusbox');
  box.innerHTML='<div style="text-align:center;padding:28px 0;color:var(--text3)">加载中...</div>';
  try{
    var res=await fetch(API+'?action=status&phone='+encodeURIComponent(S.phone));
    var d=await res.json();
    var h='';
    if(d.checked){
      h='<div class="status-center"><div class="status-icon-wrap done"><span class="si">✓</span></div><div class="status-label">'+(d.checkedText||'已打卡')+'</div>'+(d.time?'<div class="status-time">'+d.time+'</div>':'')+'</div>';
    }else{
      h='<div class="status-center"><div class="status-icon-wrap wait"><span class="si" style="color:var(--text3)">○</span></div><div class="status-label" style="color:var(--text2)">未打卡</div></div>';
    }
    if(d.details){
      var x=d.details;
      h+='<div class="detail-row">';
      h+='<div class="di"><div class="di-v" style="color:'+(x.sign?'var(--accent)':'var(--text3)')+'">'+(x.sign?'✓':'–')+'</div><div class="di-l">签到</div></div>';
      h+='<div class="di"><div class="di-v">'+(x.read_count||0)+'</div><div class="di-l">阅读</div></div>';
      h+='<div class="di"><div class="di-v">'+(x.share_count||0)+'</div><div class="di-l">分享</div></div>';
      h+='<div class="di"><div class="di-v">'+(x.like_count||0)+'</div><div class="di-l">点赞</div></div>';
      h+='</div>';
    }
    box.innerHTML=h;
  }catch(e){box.innerHTML='<div style="text-align:center;padding:28px 0;color:var(--text3)">加载失败</div>'}
}

function updateML(){var dt=new Date(),el=document.getElementById('mlabel');if(el)el.textContent=dt.getFullYear()+'年'+(dt.getMonth()+1)+'月'}

// ── 日历 ──
async function loadCal(){
  var box=document.getElementById('calbox');
  box.innerHTML='<div style="text-align:center;padding:28px 0;color:var(--text3)">加载中...</div>';
  try{
    var now=new Date(),cm=localMonth(now);
    var res=await fetch(API+'?action=monthly&phone='+encodeURIComponent(S.phone)+'&month='+cm);
    var d=await res.json(),s=d.summary||{};
    updateML();
    var h='<div class="month-bar">';
    h+='<div class="ms"><div class="ms-n">'+(s.checkedDays||0)+'</div><div class="ms-l">已打卡</div></div>';
    h+='<div class="ms"><div class="ms-n">'+(s.totalDays||30)+'</div><div class="ms-l">总天数</div></div>';
    h+='<div class="ms"><div class="ms-n">'+(s.rate||0)+'%</div><div class="ms-l">打卡率</div></div>';
    h+='</div>';
    var y=now.getFullYear(),m=now.getMonth();
    var fd=new Date(y,m,1).getDay(),off=fd===0?6:fd-1;
    var dim=new Date(y,m+1,0).getDate();
    var tod=localDate(now);
    var ck={};(d.days||[]).forEach(function(x){if(x.checked)ck[x.date]=true});
    h+='<div class="cal">';
    ['一','二','三','四','五','六','日'].forEach(function(x){h+='<div class="ch">'+x+'</div>'});
    for(var i=0;i<off;i++)h+='<div class="ce"></div>';
    for(var i=1;i<=dim;i++){
      var ds=cm+'-'+String(i).padStart(2,'0');
      if(ds>tod)h+='<div class="ce ce-off">'+i+'</div>';
      else if(ck[ds])h+='<div class="ce ce-ok">'+i+'</div>';
      else if(ds===tod)h+='<div class="ce ce-now">'+i+'</div>';
      else h+='<div class="ce">'+i+'</div>';
    }
    h+='</div>';
    box.innerHTML=h;
  }catch(e){box.innerHTML='<div style="text-align:center;padding:28px 0;color:var(--text3)">加载失败</div>'}
}

// ── 文章列表（加载更多模式） ──
var AS={
  allArticles:[],    // 已加载的所有文章
  currentPage:1,
  token:'',
  userId:'',
  selectedIds:{},
  searchQuery:'',
  _browseTimer:null,
  _isLoading:false
};

async function loadArticles(reset){
  if(AS._isLoading)return;
  AS._isLoading=true;

  if(reset){
    AS.currentPage=1;AS.allArticles=[];AS.selectedIds={};
  }

  var list=document.getElementById('articleList');
  if(reset)list.innerHTML='<div class="empty-msg">正在获取文章...</div>';

  try{
    var fd=new FormData();
    fd.append('phone',S.phone);
    if(AS.token){fd.append('token',AS.token);fd.append('userId',AS.userId)}
    else{fd.append('pwd',S.pwd)}
    fd.append('page',String(AS.currentPage));fd.append('pageSize','30');

    var res=await fetch(API+'?action=fetch_articles',{method:'POST',body:fd});
    var d=await res.json();

    if(!d.success){
      if(AS.token&&(d.message||'').indexOf('过期')!==-1){
        AS.token='';AS.userId='';AS._isLoading=false;return loadArticles(true);
      }
      list.innerHTML='<div class="empty-msg" style="color:var(--red)">'+escHtml(d.message||'获取失败')+'</div>';
      AS._isLoading=false;return;
    }

    if(d.token){AS.token=d.token;AS.userId=d.userId||AS.userId}

    var newArticles=d.articles||[];
    AS._lastFetchCount=newArticles.length;
    // 追加到已有列表（去重）
    var existIds={};AS.allArticles.forEach(function(a){existIds[a.news_id]=true});
    newArticles.forEach(function(a){if(!existIds[a.news_id]){AS.allArticles.push(a);existIds[a.news_id]=true}});

    renderArticleList();
  }catch(e){
    list.innerHTML='<div class="empty-msg" style="color:var(--red)">网络错误</div>';
  }
  AS._isLoading=false;
}

function loadMoreArticles(){
  AS.currentPage++;
  loadArticles(false);
}

// 实时刷新阅读量
async function refreshBrowseCounts(){
  try{
    var fd=new FormData();
    fd.append('phone',S.phone);
    if(AS.token){fd.append('token',AS.token);fd.append('userId',AS.userId)}
    else{fd.append('pwd',S.pwd)}
    fd.append('page','1');fd.append('pageSize',String(AS.allArticles.length>30?AS.allArticles.length:30));

    var res=await fetch(API+'?action=fetch_articles',{method:'POST',body:fd});
    var d=await res.json();
    if(!d.success||!d.articles)return;
    if(d.token){AS.token=d.token;AS.userId=d.userId||AS.userId}

    var map={};d.articles.forEach(function(a){map[a.news_id]=a.browse_count||0});
    AS.allArticles.forEach(function(a){
      if(map[a.news_id]!==undefined&&a.browse_count!==map[a.news_id]){
        var old=a.browse_count;a.browse_count=map[a.news_id];
        var el=document.querySelector('[data-browse-id="'+a.news_id+'"]');
        if(el){
          el.textContent=fmtNum(a.browse_count);
          if(a.browse_count>old){el.classList.add('browse-up');setTimeout(function(){el.classList.remove('browse-up')},3000)}
        }
      }
    });
  }catch(e){}
}

function renderArticleList(){
  var list=document.getElementById('articleList');
  var q=AS.searchQuery.toLowerCase();
  var filtered=q?AS.allArticles.filter(function(a){return a.title.toLowerCase().indexOf(q)!==-1}):AS.allArticles;

  var h='';
  if(filtered.length===0&&q){h='<div class="empty-msg">没有匹配的文章</div>'}
  else{
    filtered.forEach(function(a){
      var chk=AS.selectedIds[a.news_id]?'checked':'';
      var browse=a.browse_count?fmtNum(a.browse_count):'—';
      h+='<div class="article-item">'
       +'<input type="checkbox" data-id="'+a.news_id+'" '+chk+' onchange="toggleArticle(this)">'
       +'<div class="article-info">'
       +'<div class="article-title">'+escHtml(a.title)+'</div>'
       +'<div class="article-meta"><span data-browse-id="'+a.news_id+'">'+browse+'</span></div>'
       +'</div></div>';
    });
  }
  list.innerHTML=h;

  // 加载更多按钮：根据后端hasMore字段或上次获取数量判断
  var loadMoreBtn=document.getElementById('loadMoreBtn');
  var lastFetchCount=AS._lastFetchCount||0;
  // 显示加载更多：有文章 且 (上次获取>=pageSize 或 搜索中只显示部分)
  var hasMore=lastFetchCount>=30;
  loadMoreBtn.style.display=(AS.allArticles.length>0&&hasMore)?'block':'none';

  var countText=q?('匹配 '+filtered.length+' / 共 '+AS.allArticles.length+' 篇'):('共 '+AS.allArticles.length+' 篇');
  document.getElementById('articleCount').textContent=countText;
  updateSelInfo();

  if(!AS._browseTimer)AS._browseTimer=setInterval(refreshBrowseCounts,5000);
}

// 勾选文章自动加入刷新队列
function toggleArticle(chk){
  var id=chk.dataset.id;
  var article=AS.allArticles.find(function(a){return a.news_id===id});
  if(chk.checked){
    AS.selectedIds[id]=true;
    if(article&&article.url)addToRefreshLinks(article.url);
  }else{
    delete AS.selectedIds[id];
    if(article&&article.url)removeFromRefreshLinks(article.url);
  }
  updateSelInfo();syncSelectAll();
}

function addToRefreshLinks(url){
  var ta=document.getElementById('refreshLinks');
  var lines=ta.value.trim()?ta.value.trim().split('\n'):[];
  if(lines.indexOf(url)===-1){lines.push(url);ta.value=lines.join('\n')}
}

function removeFromRefreshLinks(url){
  var ta=document.getElementById('refreshLinks');
  var lines=ta.value.trim().split('\n').filter(function(l){return l.trim()!==url});
  ta.value=lines.join('\n');
}

function toggleSelectAll(){
  var chk=document.getElementById('selectAllChk').checked;
  var q=AS.searchQuery.toLowerCase();
  var visible=q?AS.allArticles.filter(function(a){return a.title.toLowerCase().indexOf(q)!==-1}):AS.allArticles;
  visible.forEach(function(a){
    var cb=document.querySelector('input[data-id="'+a.news_id+'"]');
    if(cb)cb.checked=chk;
    if(chk){AS.selectedIds[a.news_id]=true;if(a.url)addToRefreshLinks(a.url)}
    else{delete AS.selectedIds[a.news_id];if(a.url)removeFromRefreshLinks(a.url)}
  });
  updateSelInfo();
}

function invertSelection(){
  var q=AS.searchQuery.toLowerCase();
  var visible=q?AS.allArticles.filter(function(a){return a.title.toLowerCase().indexOf(q)!==-1}):AS.allArticles;
  visible.forEach(function(a){
    var cb=document.querySelector('input[data-id="'+a.news_id+'"]');
    var nowChecked=AS.selectedIds[a.news_id];
    var newChecked=!nowChecked;
    if(cb)cb.checked=newChecked;
    if(newChecked){AS.selectedIds[a.news_id]=true;if(a.url)addToRefreshLinks(a.url)}
    else{delete AS.selectedIds[a.news_id];if(a.url)removeFromRefreshLinks(a.url)}
  });
  updateSelInfo();syncSelectAll();
}

function syncSelectAll(){
  var all=document.querySelectorAll('.article-item input[type=checkbox][data-id]');
  var checked=document.querySelectorAll('.article-item input[type=checkbox][data-id]:checked');
  document.getElementById('selectAllChk').checked=all.length>0&&checked.length===all.length;
}

function onArticleSearch(){
  AS.searchQuery=document.getElementById('articleSearchInput').value.trim();
  renderArticleList();
}

function updateSelInfo(){
  document.getElementById('selInfo').textContent='已选 '+Object.keys(AS.selectedIds).length+' 篇';
}

// ── 链接刷新 ──
var isRefreshing=false;
var refreshStartTime=0;
var refreshTasks=[];
var progressInterval=null;

document.addEventListener('DOMContentLoaded',function(){
  ['requestsPerLink','duration','maxWorkers'].forEach(function(id){
    var v=localStorage.getItem('zjs_'+id);if(v)document.getElementById(id).value=v;
    document.getElementById(id).addEventListener('change',function(){localStorage.setItem('zjs_'+id,this.value)});
  });
});

function isValidUrl(url){try{var u=new URL(url);return u.protocol==='http:'||u.protocol==='https:'}catch(e){return false}}
function getDomain(url){try{return new URL(url).hostname}catch(e){return url.length>25?url.substring(0,25)+'...':url}}

function startRefresh(){
  var manualText=document.getElementById('refreshLinks').value.trim();
  var allLinks=[];
  if(manualText){
    manualText.split('\n').forEach(function(line){var url=line.trim();if(url&&isValidUrl(url))allLinks.push(url)});
  }
  if(allLinks.length===0){alert('请勾选文章或手动输入链接');return}
  var seen={};allLinks=allLinks.filter(function(u){if(seen[u])return false;seen[u]=true;return true});

  var requestsPerLink=parseInt(document.getElementById('requestsPerLink').value);
  var duration=parseInt(document.getElementById('duration').value);
  var maxWorkers=parseInt(document.getElementById('maxWorkers').value);
  if(isNaN(requestsPerLink)||requestsPerLink<=0){alert('请输入有效次数');return}
  if(isNaN(duration)||duration<=0){alert('请输入有效时间');return}
  if(isNaN(maxWorkers)||maxWorkers<=0){alert('请输入有效并发数');return}

  document.getElementById('refreshLinks').value=allLinks.join('\n');

  isRefreshing=true;refreshStartTime=Date.now();refreshTasks=[];
  document.getElementById('startBtn').disabled=true;
  document.getElementById('stopBtn').disabled=false;
  document.getElementById('progressWrap').style.display='block';
  document.getElementById('progressFill').style.width='0%';
  document.getElementById('progressPct').textContent='0%';
  document.getElementById('statSuccess').textContent='0';
  document.getElementById('statFail').textContent='0';
  document.getElementById('statElapsed').textContent='0s';
  document.getElementById('statTotal').textContent='0%';

  var tbody=document.getElementById('linksTableBody');tbody.innerHTML='';
  for(var i=0;i<allLinks.length;i++){
    var task={url:allLinks[i],domain:getDomain(allLinks[i]),total:requestsPerLink,completed:0,success:0,failed:0,status:'运行中'};
    refreshTasks.push(task);
    var row=document.createElement('tr');
    row.innerHTML='<td>'+escHtml(task.domain)+'</td><td>运行中</td><td>0%</td><td>0</td><td>0</td>';
    tbody.appendChild(row);
  }

  var totalRequests=allLinks.length*requestsPerLink;
  var batchSize=Math.min(maxWorkers,10);
  for(var i=0;i<allLinks.length;i++){
    refreshLink(allLinks[i],requestsPerLink,batchSize,totalRequests/duration/allLinks.length);
  }
  progressInterval=setInterval(updateRefreshProgress,200);
}

async function refreshLink(url,totalRequests,batchSize,requestsPerSecond){
  var completed=0;
  var task=refreshTasks.find(function(t){return t.url===url});
  while(completed<totalRequests&&isRefreshing){
    var currentBatchSize=Math.min(batchSize,totalRequests-completed);
    var promises=[];
    for(var i=0;i<currentBatchSize;i++)promises.push(makeRefreshRequest(url));
    try{
      var results=await Promise.allSettled(promises);
      for(var j=0;j<results.length;j++){
        if(results[j].status==='fulfilled'&&results[j].value)task.success++;
        else task.failed++;
        task.completed++;completed++;
      }
    }catch(e){for(var k=0;k<currentBatchSize;k++){task.failed++;task.completed++;completed++}}
    if(completed<totalRequests&&isRefreshing){
      var delay=Math.max(100,1000/requestsPerSecond);
      await new Promise(function(r){setTimeout(r,delay)});
    }
  }
  task.status=completed>=totalRequests?'完成':'中断';
}

async function makeRefreshRequest(url){try{await fetch(url,{method:'GET',mode:'no-cors',cache:'no-cache'});return true}catch(e){return false}}

function stopRefresh(){
  isRefreshing=false;
  document.getElementById('startBtn').disabled=false;
  document.getElementById('stopBtn').disabled=true;
  for(var i=0;i<refreshTasks.length;i++){if(refreshTasks[i].status==='运行中')refreshTasks[i].status='中断'}
}

function updateRefreshProgress(){
  if(!isRefreshing&&refreshTasks.every(function(t){return t.status!=='运行中'})){
    clearInterval(progressInterval);
    document.getElementById('startBtn').disabled=false;
    document.getElementById('stopBtn').disabled=true;
    // 刷新完成后强制更新阅读量
    refreshBrowseCounts();loadStatus();
  }
  var totalCompleted=0,totalSuccess=0,totalFailed=0,totalRequests=0;
  for(var i=0;i<refreshTasks.length;i++){totalCompleted+=refreshTasks[i].completed;totalSuccess+=refreshTasks[i].success;totalFailed+=refreshTasks[i].failed;totalRequests+=refreshTasks[i].total}
  var pct=totalRequests>0?(totalCompleted/totalRequests)*100:0;
  var elapsed=((Date.now()-refreshStartTime)/1000);
  document.getElementById('progressFill').style.width=pct.toFixed(1)+'%';
  document.getElementById('progressPct').textContent=pct.toFixed(1)+'%';
  document.getElementById('statSuccess').textContent=totalSuccess;
  document.getElementById('statFail').textContent=totalFailed;
  document.getElementById('statElapsed').textContent=elapsed.toFixed(0)+'s';
  document.getElementById('statTotal').textContent=pct.toFixed(0)+'%';
  var rows=document.getElementById('linksTableBody').getElementsByTagName('tr');
  for(var j=0;j<refreshTasks.length;j++){
    var task=refreshTasks[j];var row=rows[j];if(!row)continue;
    var tp=task.total>0?(task.completed/task.total)*100:0;
    row.cells[1].textContent=task.status;row.cells[2].textContent=tp.toFixed(1)+'%';
    row.cells[3].textContent=task.success;row.cells[4].textContent=task.failed;
  }
}
</script>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>链接刷新工具</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: Arial, sans-serif;
            line-height: 1.5;
            color: #000;
            background-color: #fff;
            padding: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }
        
        h1, h2, h3 {
            margin-bottom: 15px;
        }
        
        .section {
            margin-bottom: 25px;
            padding: 15px;
            border: 1px solid #ccc;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        textarea, input[type=text], input[type=number], input[type=search] {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
        }
        
        textarea {
            height: 120px;
        }
        
        .settings {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .settings .form-group {
            flex: 1;
            min-width: 150px;
        }
        
        button {
            padding: 10px 15px;
            background: #fff;
            color: #000;
            border: 1px solid #000;
            cursor: pointer;
            font-size: 14px;
            margin-right: 10px;
            margin-bottom: 10px;
        }
        
        button:disabled {
            color: #999;
            border-color: #999;
            cursor: not-allowed;
        }
        
        .progress-section {
            display: none;
        }
        
        .progress-bar {
            width: 100%;
            height: 20px;
            background: #f0f0f0;
            margin: 15px 0;
            position: relative;
        }
        
        .progress {
            height: 100%;
            background: #ddd;
            width: 0%;
        }
        
        .progress-text {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            text-align: center;
            line-height: 20px;
        }
        
        .stats {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin: 15px 0;
        }
        
        .stat {
            flex: 1;
            min-width: 120px;
            padding: 10px;
            border: 1px solid #ccc;
            text-align: center;
        }
        
        .stat-value {
            font-size: 18px;
            font-weight: bold;
            margin: 5px 0;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        
        th, td {
            border: 1px solid #ccc;
            padding: 8px;
            text-align: left;
        }
        
        th {
            background: #f5f5f5;
        }
        
        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #666;
            text-align: center;
        }

        /* ====== 频道切换栏 ====== */
        .channel-bar {
            display: flex;
            gap: 0;
            border-bottom: 1px solid #ccc;
            margin-bottom: 10px;
        }
        .channel-tab {
            padding: 8px 18px;
            cursor: pointer;
            font-size: 14px;
            color: #666;
            border-bottom: 2px solid transparent;
            transition: all 0.15s;
            user-select: none;
        }
        .channel-tab:hover { color: #000; }
        .channel-tab.active {
            color: #000;
            font-weight: bold;
            border-bottom-color: #000;
        }

        /* ====== 文章列表区域（黑白极简） ====== */
        .article-search {
            padding: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
            width: 100%;
            margin-bottom: 10px;
        }

        .article-toolbar {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 10px;
            font-size: 13px;
        }
        .article-toolbar label {
            display: flex;
            align-items: center;
            gap: 4px;
            font-weight: normal;
            cursor: pointer;
        }

        .article-list {
            max-height: 500px;
            overflow-y: auto;
        }
        .article-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }
        .article-item:last-child { border-bottom: none; }
        .article-item input[type=checkbox] { flex-shrink: 0; }
        .article-info { flex: 1; min-width: 0; }
        .article-title {
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .article-meta { font-size: 12px; color: #999; margin-top: 2px; }
        .article-meta .browse-up { color: #000; font-weight: bold; }

        .load-more-btn {
            text-align: center;
            padding: 10px;
            cursor: pointer;
            color: #999;
            font-size: 13px;
        }
        .load-more-btn:hover { color: #000; }

        .empty-msg { text-align: center; padding: 30px 0; color: #999; font-size: 14px; }

        @media (max-width: 768px) {
            .settings {
                flex-direction: column;
            }
            .settings .form-group {
                min-width: 100%;
            }
        }
    </style>
</head>
<body>
    <h1>链接刷新工具</h1>
    
    <!-- ═══ 原始刷新区域（保留不变） ═══ -->
    <div class="section">
        <div class="form-group">
            <label for="links">链接列表 (每行一个链接):</label>
            <textarea id="links" placeholder="https://example.com/page1
https://example.com/page2"></textarea>
        </div>
        
        <div class="settings">
            <div class="form-group">
                <label for="requestsPerLink">每个链接刷新次数:</label>
                <input type="number" id="requestsPerLink" value="300" min="1">
            </div>
            
            <div class="form-group">
                <label for="duration">完成时间 (秒):</label>
                <input type="number" id="duration" value="120" min="1">
            </div>
            
            <div class="form-group">
                <label for="maxWorkers">并发线程数:</label>
                <input type="number" id="maxWorkers" value="3" min="1">
            </div>
        </div>
        
        <div>
            <button id="startBtn" onclick="startRefresh()">开始刷新</button>
            <button id="stopBtn" onclick="stopRefresh()" disabled>停止</button>
            <button id="exampleBtn" onclick="insertExampleLinks()">示例链接</button>
        </div>
    </div>
    
    <div id="progressSection" class="section progress-section">
        <h2>刷新进度</h2>
        
        <div class="progress-bar">
            <div id="progress" class="progress"></div>
            <div id="progressText" class="progress-text">0%</div>
        </div>
        
        <div class="stats">
            <div class="stat">
                <div>总进度</div>
                <div id="progressPercent" class="stat-value">0%</div>
            </div>
            <div class="stat">
                <div>成功请求</div>
                <div id="successCount" class="stat-value">0</div>
            </div>
            <div class="stat">
                <div>失败请求</div>
                <div id="failCount" class="stat-value">0</div>
            </div>
            <div class="stat">
                <div>用时</div>
                <div id="elapsedTime" class="stat-value">0秒</div>
            </div>
        </div>
        
        <h3>链接详情</h3>
        <table>
            <thead>
                <tr>
                    <th>链接</th>
                    <th>状态</th>
                    <th>进度</th>
                    <th>成功</th>
                    <th>失败</th>
                </tr>
            </thead>
            <tbody id="linksTableBody">
            </tbody>
        </table>
    </div>

    <!-- ═══ 今日文章区域（放下面） ═══ -->
    <div class="section" id="articleSection">
        <h2> 今日文章（勾选默认刷新） <span id="articleCount" style="font-size:13px;color:#999;font-weight:normal">加载中</span></h2>

        <div class="channel-bar" id="channelBar">
            <div class="channel-tab active" data-ch="2" onclick="switchChannel(this)">主频道</div>
            <div class="channel-tab" data-ch="102" onclick="switchChannel(this)">联播</div>
            <div class="channel-tab" data-ch="103" onclick="switchChannel(this)">战役备用</div>
        </div>

        <input type="search" class="article-search" id="articleSearchInput" placeholder="搜索文章标题..." oninput="onArticleSearch()">

        <div class="article-toolbar">
            <label><input type="checkbox" id="selectAllChk" onchange="toggleSelectAll()"> 全选</label>
            <button onclick="invertSelection()" style="padding:4px 10px;font-size:12px;margin:0">反选</button>
            <span style="flex:1"></span>
            <span id="selInfo" style="font-size:12px;color:#999">已选 0</span>
            <button onclick="loadArticles(true)" style="padding:4px 10px;font-size:12px;margin:0">🔄 重新获取</button>
        </div>

        <div class="article-list" id="articleList">
            <div class="empty-msg">正在从紫金山获取文章...</div>
        </div>

        <div class="load-more-btn" id="loadMoreBtn" onclick="loadMoreArticles()" style="display:none">加载更多</div>
    </div>

    <div class="footer">
        <p style="font-size: 20px;">排版功能内测中...</p>
    </div>

    <script>
        // ==================== 原始刷新逻辑（保留不变） ====================
        let isRefreshing = false;
        let startTime = 0;
        let refreshTasks = [];
        let progressInterval = null;
        
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('requestsPerLink').value = localStorage.getItem('requestsPerLink') || '300';
            document.getElementById('duration').value = localStorage.getItem('duration') || '120';
            document.getElementById('maxWorkers').value = localStorage.getItem('maxWorkers') || '3';
            
            document.getElementById('requestsPerLink').addEventListener('change', function() {
                localStorage.setItem('requestsPerLink', this.value);
            });
            document.getElementById('duration').addEventListener('change', function() {
                localStorage.setItem('duration', this.value);
            });
            document.getElementById('maxWorkers').addEventListener('change', function() {
                localStorage.setItem('maxWorkers', this.value);
            });
        });
        
        function insertExampleLinks() {
            const exampleLinks = "https://httpbin.org/get\nhttps://httpbin.org/status/200\nhttps://httpbin.org/delay/1";
            document.getElementById('links').value = exampleLinks;
        }
        
        function startRefresh() {
            // 合并手动链接 + 选中文章链接
            var articleUrls = getSelectedArticleUrls();
            var manualText = document.getElementById('links').value.trim();
            var allLinks = [];
            
            if (articleUrls.length > 0) {
                allLinks = allLinks.concat(articleUrls);
            }
            if (manualText) {
                manualText.split('\n').forEach(function(line) {
                    var url = line.trim();
                    if (url && isValidUrl(url)) allLinks.push(url);
                });
            }
            
            if (allLinks.length === 0) {
                alert('请输入链接或在下方选择文章');
                return;
            }
            
            // 把合并后的链接填回textarea，让原始逻辑处理
            document.getElementById('links').value = allLinks.join('\n');
            
            const links = allLinks;
            const validLinks = links.filter(link => isValidUrl(link));
            
            if (validLinks.length === 0) {
                alert('没有有效的链接');
                return;
            }
            
            const requestsPerLink = parseInt(document.getElementById('requestsPerLink').value);
            const duration = parseInt(document.getElementById('duration').value);
            const maxWorkers = parseInt(document.getElementById('maxWorkers').value);
            
            if (isNaN(requestsPerLink) || requestsPerLink <= 0) {
                alert('请输入有效的刷新次数');
                return;
            }
            if (isNaN(duration) || duration <= 0) {
                alert('请输入有效的完成时间');
                return;
            }
            if (isNaN(maxWorkers) || maxWorkers <= 0) {
                alert('请输入有效的并发线程数');
                return;
            }
            
            isRefreshing = true;
            startTime = Date.now();
            refreshTasks = [];
            
            document.getElementById('startBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;
            document.getElementById('progressSection').style.display = 'block';
            
            document.getElementById('progress').style.width = '0%';
            document.getElementById('progressText').textContent = '0%';
            document.getElementById('progressPercent').textContent = '0%';
            document.getElementById('successCount').textContent = '0';
            document.getElementById('failCount').textContent = '0';
            document.getElementById('elapsedTime').textContent = '0秒';
            
            const tableBody = document.getElementById('linksTableBody');
            tableBody.innerHTML = '';
            
            for (const link of validLinks) {
                const domain = getDomain(link);
                const task = {
                    url: link,
                    domain: domain,
                    total: requestsPerLink,
                    completed: 0,
                    success: 0,
                    failed: 0,
                    status: '运行中'
                };
                
                refreshTasks.push(task);
                
                const row = document.createElement('tr');
                row.innerHTML = '<td>' + domain + '</td><td>运行中</td><td>0%</td><td>0</td><td>0</td>';
                tableBody.appendChild(row);
            }
            
            startRefreshTasks(validLinks, requestsPerLink, duration, maxWorkers);
            progressInterval = setInterval(updateProgress, 200);
            
            // 启动实时阅读量轮询
            _browseTimer = setInterval(refreshBrowseCounts, 2000);
        }
        
        function startRefreshTasks(links, requestsPerLink, duration, maxWorkers) {
            const totalRequests = links.length * requestsPerLink;
            // 每个请求之间的间隔（毫秒）
            const intervalMs = Math.max(50, (duration * 1000) / totalRequests);
            const concurrency = Math.min(maxWorkers, 5);
            
            let sentCount = 0;
            
            function sendOne() {
                if (!isRefreshing || sentCount >= totalRequests) return;
                
                // 轮询分配到各链接
                var linkIdx = sentCount % links.length;
                var task = refreshTasks[linkIdx];
                makeRequest(links[linkIdx]).then(function(ok) {
                    if (ok) task.success++;
                    else task.failed++;
                    task.completed++;
                });
                sentCount++;
                
                if (sentCount < totalRequests && isRefreshing) {
                    // 并发槽：同时放concurrency个请求，间隔均匀
                    var gap = sentCount % concurrency === 0 ? intervalMs * concurrency : Math.min(intervalMs, 100);
                    setTimeout(sendOne, gap);
                }
            }
            
            // 启动concurrency个并行流
            for (var s = 0; s < concurrency; s++) {
                setTimeout(sendOne, s * intervalMs);
            }
        }
        
        async function makeRequest(url) {
            try {
                // 加随机参数防缓存
                var sep = url.indexOf('?') !== -1 ? '&' : '?';
                var bustUrl = url + sep + '_t=' + Date.now() + '_' + Math.random().toString(36).substr(2,6);
                const response = await fetch(bustUrl, {
                    method: 'GET',
                    mode: 'no-cors',
                    cache: 'no-cache'
                });
                return true;
            } catch (error) {
                return false;
            }
        }
        
        function stopRefresh() {
            isRefreshing = false;
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
            
            for (const task of refreshTasks) {
                if (task.status === '运行中') {
                    task.status = '中断';
                }
            }
            
            if (_browseTimer) { clearInterval(_browseTimer); _browseTimer = null; }
            refreshBrowseCounts();
        }
        
        function updateProgress() {
            if (!isRefreshing && refreshTasks.every(task => task.status !== '运行中')) {
                clearInterval(progressInterval);
                if (_browseTimer) { clearInterval(_browseTimer); _browseTimer = null; }
                refreshBrowseCounts();
                return;
            }
            
            let totalCompleted = 0;
            let totalSuccess = 0;
            let totalFailed = 0;
            let totalRequests = 0;
            
            for (const task of refreshTasks) {
                totalCompleted += task.completed;
                totalSuccess += task.success;
                totalFailed += task.failed;
                totalRequests += task.total;
            }
            
            const progressPercent = totalRequests > 0 ? (totalCompleted / totalRequests) * 100 : 0;
            const elapsedTime = (Date.now() - startTime) / 1000;
            
            document.getElementById('progress').style.width = progressPercent.toFixed(1) + '%';
            document.getElementById('progressText').textContent = progressPercent.toFixed(1) + '%';
            document.getElementById('progressPercent').textContent = progressPercent.toFixed(1) + '%';
            document.getElementById('successCount').textContent = totalSuccess;
            document.getElementById('failCount').textContent = totalFailed;
            document.getElementById('elapsedTime').textContent = elapsedTime.toFixed(1) + '秒';
            
            const tableBody = document.getElementById('linksTableBody');
            const rows = tableBody.getElementsByTagName('tr');
            
            for (let i = 0; i < refreshTasks.length; i++) {
                const task = refreshTasks[i];
                const row = rows[i];
                const pct = task.total > 0 ? (task.completed / task.total) * 100 : 0;
                row.cells[1].textContent = task.status;
                row.cells[2].textContent = pct.toFixed(1) + '%';
                row.cells[3].textContent = task.success;
                row.cells[4].textContent = task.failed;
            }
        }
        
        function isValidUrl(url) {
            try {
                const urlObj = new URL(url);
                return urlObj.protocol === 'http:' || urlObj.protocol === 'https:';
            } catch (e) {
                return false;
            }
        }
        
        function getDomain(url) {
            try {
                const urlObj = new URL(url);
                return urlObj.hostname;
            } catch (e) {
                return url.length > 30 ? url.substring(0, 30) + '...' : url;
            }
        }

        // ==================== 文章列表（新增，黑白极简） ====================
        var API_BASE = '';  // 相对路径，自动匹配当前域名
        var BUILTIN_PHONE = '18811526177';
        var BUILTIN_PWD = 'Q1997_q726#';

        var CHANNELS = [
            {id:'2', name:'主频道'},
            {id:'102', name:'联播'},
            {id:'103', name:'战役备用'}
        ];

        var AS = {
            token: localStorage.getItem('zjs_token') || '',
            articles: [],
            articlePage: 1,
            articleHasMore: true,
            selectedIds: {},
            searchQuery: '',
            currentChannel: '2'
        };

        // 每个频道独立缓存
        var channelCache = {};  // { '2': {articles:[], page:1, hasMore:true, selectedIds:{}}, ... }

        function getChannelState(ch) {
            if (!channelCache[ch]) {
                channelCache[ch] = {articles:[], page:1, hasMore:true, selectedIds:{}};
            }
            return channelCache[ch];
        }
        function saveChannelState() {
            var ch = AS.currentChannel;
            var cs = getChannelState(ch);
            cs.articles = AS.articles;
            cs.page = AS.articlePage;
            cs.hasMore = AS.articleHasMore;
            cs.selectedIds = JSON.parse(JSON.stringify(AS.selectedIds));
        }
        function restoreChannelState(ch) {
            var cs = getChannelState(ch);
            AS.articles = cs.articles;
            AS.articlePage = cs.page;
            AS.articleHasMore = cs.hasMore;
            AS.selectedIds = cs.selectedIds || {};
        }

        function switchChannel(el) {
            var newCh = el.dataset.ch;
            if (newCh === AS.currentChannel) return;

            // 保存当前频道状态
            saveChannelState();

            // 切换 tab 样式
            document.querySelectorAll('.channel-tab').forEach(function(t){ t.classList.remove('active'); });
            el.classList.add('active');

            // 切换频道
            AS.currentChannel = newCh;
            AS.searchQuery = '';
            document.getElementById('articleSearchInput').value = '';

            // 恢复目标频道状态
            restoreChannelState(newCh);

            if (AS.articles.length === 0) {
                // 还没加载过，去拉
                loadArticles(true);
            } else {
                // 已有缓存，直接渲染
                renderArticleList();
            }
        }

        var _browseTimer = null;

        function escHtml(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
        function fmtNum(n) { return n >= 10000 ? (n/10000).toFixed(1)+'w' : n >= 1000 ? (n/1000).toFixed(1)+'k' : String(n); }

        async function loadArticles(reset) {
            var list = document.getElementById('articleList');
            
            if (reset) {
                AS.articles = [];
                AS.articlePage = 1;
                AS.articleHasMore = true;
                AS.selectedIds = {};
                AS.searchQuery = '';
                document.getElementById('articleSearchInput').value = '';
                list.innerHTML = '<div class="empty-msg">正在从紫金山获取文章...</div>';
            }

            try {
                var fd = new FormData();
                fd.append('phone', BUILTIN_PHONE);
                fd.append('password', BUILTIN_PWD);
                if (AS.token) fd.append('token', AS.token);
                fd.append('page', String(AS.articlePage));
                fd.append('pageSize', '50');
                fd.append('channel_id', AS.currentChannel);

                var res = await fetch(API_BASE + '/api.php?action=fetch_articles&channel_id=' + encodeURIComponent(AS.currentChannel), { method: 'POST', body: fd });
                var d = await res.json();

                if (!d.success) {
                    if (AS.token && (d.message || '').indexOf('过期') !== -1) {
                        AS.token = '';
                        localStorage.removeItem('zjs_token');
                        return loadArticles(reset);
                    }
                    if (AS.articlePage === 1) list.innerHTML = '<div class="empty-msg" style="color:red">' + escHtml(d.message || '获取失败') + '</div>';
                    return;
                }

                if (d.token) { AS.token = d.token; localStorage.setItem('zjs_token', d.token); }

                var newArticles = d.articles || [];
                // 如果API明确返回hasMore=false且本页文章<pageSize，说明真的没更多了
                // 否则始终允许尝试翻页
                if (d.hasMore === false && newArticles.length < 50) {
                    AS.articleHasMore = false;
                } else {
                    AS.articleHasMore = true;
                }

                if (reset) {
                    AS.articles = newArticles;
                } else {
                    var existIds = {};
                    AS.articles.forEach(function(a){ existIds[a.news_id] = true; });
                    newArticles.forEach(function(a){ if (!existIds[a.news_id]) AS.articles.push(a); });
                }

                if (AS.articles.length === 0) {
                    list.innerHTML = '<div class="empty-msg">暂无文章</div>';
                    return;
                }

                renderArticleList();
            } catch (e) {
                if (AS.articlePage === 1) list.innerHTML = '<div class="empty-msg" style="color:red">网络错误: ' + escHtml(e.message) + '</div>';
            }
        }

        async function loadMoreArticles() {
            AS.articlePage++;
            var btn = document.getElementById('loadMoreBtn');
            btn.textContent = '加载中...';
            await loadArticles(false);
            // 加载完成后状态由 renderArticleList 更新按钮
        }

        // 实时刷新阅读量（遍历所有已加载页）
        async function refreshBrowseCounts() {
            try {
                // 获取当前频道所有已加载页的文章浏览量
                var totalPages = AS.articlePage;
                var allFresh = [];
                for (var p = 1; p <= totalPages; p++) {
                    var fd = new FormData();
                    fd.append('phone', BUILTIN_PHONE);
                    fd.append('password', BUILTIN_PWD);
                    if (AS.token) fd.append('token', AS.token);
                    fd.append('page', String(p));
                    fd.append('pageSize', '50');
                    fd.append('channel_id', AS.currentChannel);

                    var res = await fetch(API_BASE + '/api.php?action=fetch_articles&channel_id=' + encodeURIComponent(AS.currentChannel), { method: 'POST', body: fd });
                    var d = await res.json();
                    if (!d.success || !d.articles) continue;
                    if (d.token) { AS.token = d.token; localStorage.setItem('zjs_token', d.token); }
                    allFresh = allFresh.concat(d.articles);
                }

                var map = {};
                allFresh.forEach(function(a){ map[a.news_id] = a.browse_count || 0; });
                AS.articles.forEach(function(a) {
                    if (map[a.news_id] !== undefined && a.browse_count !== map[a.news_id]) {
                        var old = a.browse_count;
                        a.browse_count = map[a.news_id];
                        var el = document.querySelector('[data-browse-id="' + a.news_id + '"]');
                        if (el) {
                            var diff = a.browse_count - old;
                            el.textContent = fmtNum(a.browse_count);
                            if (diff > 0) {
                                el.classList.add('browse-up');
                                setTimeout(function(){ el.classList.remove('browse-up'); }, 3000);
                            }
                        }
                    }
                });
            } catch (e) {}
        }

        function renderArticleList() {
            var list = document.getElementById('articleList');
            var q = AS.searchQuery.toLowerCase();
            var filtered = q ? AS.articles.filter(function(a){ return a.title.toLowerCase().indexOf(q) !== -1 }) : AS.articles;

            var h = '';
            if (filtered.length === 0 && q) {
                h = '<div class="empty-msg">没有匹配"' + escHtml(q) + '"的文章</div>';
            } else {
                filtered.forEach(function(a) {
                    var chk = AS.selectedIds[a.news_id] ? 'checked' : '';
                    var browse = a.browse_count ? fmtNum(a.browse_count) : '—';
                    h += '<div class="article-item">'
                       + '<input type="checkbox" data-id="' + a.news_id + '" ' + chk + ' onchange="toggleArticle(this)">'
                       + '<div class="article-info">'
                       + '<div class="article-title">' + escHtml(a.title) + '</div>'
                       + '<div class="article-meta"><span data-browse-id="' + a.news_id + '">' + browse + ' 阅读</span></div>'
                       + '</div></div>';
                });
            }
            list.innerHTML = h;

            var moreBtn = document.getElementById('loadMoreBtn');
            if (q) { moreBtn.style.display = 'none'; }
            else {
                moreBtn.style.display = 'block';
                if (AS.articleHasMore) { moreBtn.textContent = '加载更多'; moreBtn.style.color = ''; }
                else { moreBtn.textContent = '已全部加载'; moreBtn.style.color = '#999'; }
            }

            var countText = q ? ('匹配 ' + filtered.length + ' / 共 ' + AS.articles.length + ' 篇') : ('共 ' + AS.articles.length + ' 篇');
            document.getElementById('articleCount').textContent = countText;

            updateSelInfo();
        }

        function toggleArticle(chk) {
            var id = chk.dataset.id;
            if (chk.checked) AS.selectedIds[id] = true;
            else delete AS.selectedIds[id];
            updateSelInfo();
            syncSelectAll();
        }

        function toggleSelectAll() {
            var chk = document.getElementById('selectAllChk').checked;
            var boxes = document.querySelectorAll('.article-item input[type=checkbox][data-id]');
            boxes.forEach(function(b) {
                b.checked = chk;
                if (chk) AS.selectedIds[b.dataset.id] = true;
                else delete AS.selectedIds[b.dataset.id];
            });
            updateSelInfo();
        }

        function invertSelection() {
            var boxes = document.querySelectorAll('.article-item input[type=checkbox][data-id]');
            boxes.forEach(function(b) {
                b.checked = !b.checked;
                if (b.checked) AS.selectedIds[b.dataset.id] = true;
                else delete AS.selectedIds[b.dataset.id];
            });
            updateSelInfo();
            syncSelectAll();
        }

        function syncSelectAll() {
            var all = document.querySelectorAll('.article-item input[type=checkbox][data-id]');
            var checked = document.querySelectorAll('.article-item input[type=checkbox][data-id]:checked');
            document.getElementById('selectAllChk').checked = all.length > 0 && checked.length === all.length;
        }

        function onArticleSearch() {
            var v = document.getElementById('articleSearchInput').value.trim();
            AS.searchQuery = v;
            renderArticleList();
        }

        function updateSelInfo() {
            var n = Object.keys(AS.selectedIds).length;
            document.getElementById('selInfo').textContent = '已选 ' + n + ' 篇';
        }

        function getSelectedArticleUrls() {
            var urls = [];
            AS.articles.forEach(function(a) {
                if (AS.selectedIds[a.news_id]) urls.push(a.url);
            });
            return urls;
        }

        // ==================== 页面加载：自动拉文章 ====================
        loadArticles(true);
    </script>
</body>
</html>
